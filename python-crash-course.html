<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python 速成核心課程</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --surface2: #1a1a26;
  --border: #2a2a3a;
  --text: #e0e0e8;
  --text-dim: #8888a0;
  --accent: #22d68a;
  --accent2: #18b876;
  --accent-glow: rgba(34,214,138,0.15);
  --code-bg: #0d0d14;
  --warn: #f59e0b;
  --error: #ef4444;
  --correct: #22d68a;
  --wrong: #ef4444;
  --tag-bg: rgba(34,214,138,0.1);
  --tag-border: rgba(34,214,138,0.25);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans TC', sans-serif;
  line-height: 1.75;
  min-height: 100vh;
}

.app {
  max-width: 820px;
  margin: 0 auto;
  padding: 20px 20px 80px;
}

/* Header */
.header {
  text-align: center;
  padding: 48px 0 32px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 36px;
}
.header h1 {
  font-size: 2.2rem;
  font-weight: 900;
  letter-spacing: -1px;
  background: linear-gradient(135deg, var(--accent), #4ade80, var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
}
.header .sub {
  color: var(--text-dim);
  font-size: 0.95rem;
}
.header .sub strong { color: var(--accent); font-weight: 700; }

/* Progress bar */
.progress-wrap {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg);
  padding: 12px 0 8px;
  border-bottom: 1px solid var(--border);
}
.progress-bar {
  height: 4px;
  background: var(--surface2);
  border-radius: 4px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), #4ade80);
  border-radius: 4px;
  transition: width 0.5s ease;
}
.progress-label {
  font-size: 0.75rem;
  color: var(--text-dim);
  margin-top: 4px;
  text-align: right;
  font-family: 'JetBrains Mono', monospace;
}

/* Nav pills */
.nav {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin: 20px 0 28px;
}
.nav-pill {
  padding: 6px 14px;
  font-size: 0.78rem;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'JetBrains Mono', monospace;
}
.nav-pill:hover { border-color: var(--accent); color: var(--text); }
.nav-pill.active {
  background: var(--accent-glow);
  border-color: var(--accent);
  color: var(--accent);
  font-weight: 600;
}
.nav-pill.completed {
  background: rgba(34,214,138,0.08);
  border-color: var(--accent2);
  color: var(--accent2);
}
.nav-pill.completed::before { content: "✓ "; }

/* Lesson */
.lesson { display: none; }
.lesson.active { display: block; }

.lesson-header {
  margin-bottom: 28px;
}
.lesson-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 4px;
}
.lesson-title {
  font-size: 1.6rem;
  font-weight: 900;
  letter-spacing: -0.5px;
}
.lesson-time {
  font-size: 0.8rem;
  color: var(--text-dim);
  margin-top: 4px;
}
.lesson-time::before { content: "⏱ "; }

/* Content blocks */
.concept {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  margin-bottom: 20px;
}
.concept h3 {
  font-size: 1.05rem;
  font-weight: 700;
  margin-bottom: 12px;
  color: var(--accent);
}
.concept p, .concept li {
  font-size: 0.92rem;
  color: var(--text);
  margin-bottom: 8px;
}
.concept ul { padding-left: 20px; }
.concept li { list-style: none; position: relative; padding-left: 16px; }
.concept li::before {
  content: "›";
  position: absolute;
  left: 0;
  color: var(--accent);
  font-weight: 700;
}

.compare-tag {
  display: inline-block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem;
  padding: 2px 8px;
  border-radius: 4px;
  margin-right: 4px;
}
.compare-tag.cpp { background: #1e3a5f; color: #60a5fa; }
.compare-tag.js  { background: #3b3510; color: #facc15; }
.compare-tag.py  { background: var(--tag-bg); color: var(--accent); border: 1px solid var(--tag-border); }

/* Code blocks */
pre {
  background: var(--code-bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
  overflow-x: auto;
  margin: 12px 0;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.82rem;
  line-height: 1.7;
  color: #c8c8d8;
}
pre .kw { color: #c084fc; }
pre .fn { color: #60a5fa; }
pre .str { color: #34d399; }
pre .cmt { color: #555570; font-style: italic; }
pre .num { color: #f59e0b; }
pre .op { color: #f472b6; }
pre .type { color: #22d3ee; }
pre .dec { color: #fb923c; }

.tip {
  background: rgba(34,214,138,0.06);
  border-left: 3px solid var(--accent);
  padding: 12px 16px;
  margin: 12px 0;
  border-radius: 0 8px 8px 0;
  font-size: 0.85rem;
}
.tip::before {
  content: "💡 ";
}
.warn-box {
  background: rgba(245,158,11,0.08);
  border-left: 3px solid var(--warn);
  padding: 12px 16px;
  margin: 12px 0;
  border-radius: 0 8px 8px 0;
  font-size: 0.85rem;
}
.warn-box::before { content: "⚠️ "; }

/* Quiz section */
.quiz-section {
  margin-top: 36px;
  padding-top: 28px;
  border-top: 2px solid var(--border);
}
.quiz-section h3 {
  font-size: 1.15rem;
  font-weight: 900;
  margin-bottom: 20px;
  color: var(--warn);
}
.quiz-section h3::before { content: "📝 "; }

.quiz-q {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 16px;
}
.quiz-q .q-text {
  font-size: 0.92rem;
  font-weight: 600;
  margin-bottom: 12px;
}
.quiz-q .q-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  color: var(--accent);
  margin-bottom: 6px;
}
.quiz-q pre { margin: 8px 0 12px; font-size: 0.8rem; }

.q-options { display: flex; flex-direction: column; gap: 8px; }
.q-opt {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
  font-size: 0.88rem;
  font-family: 'JetBrains Mono', monospace;
}
.q-opt:hover { border-color: var(--accent); background: var(--accent-glow); }
.q-opt.selected { border-color: var(--accent); background: var(--accent-glow); }
.q-opt.correct { border-color: var(--correct); background: rgba(34,214,138,0.15); }
.q-opt.wrong { border-color: var(--wrong); background: rgba(239,68,68,0.1); }
.q-opt.disabled { pointer-events: none; opacity: 0.6; }
.q-opt.correct.disabled, .q-opt.wrong.disabled { opacity: 1; }

.q-opt .marker {
  width: 22px; height: 22px;
  border-radius: 50%;
  border: 2px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.65rem;
  font-weight: 700;
  flex-shrink: 0;
  transition: all 0.2s;
}
.q-opt.selected .marker { border-color: var(--accent); color: var(--accent); }
.q-opt.correct .marker { border-color: var(--correct); background: var(--correct); color: #000; }
.q-opt.wrong .marker { border-color: var(--wrong); background: var(--wrong); color: #fff; }

.q-explain {
  margin-top: 10px;
  padding: 12px;
  border-radius: 8px;
  font-size: 0.84rem;
  display: none;
  line-height: 1.6;
}
.q-explain.show { display: block; }
.q-explain.correct-ex { background: rgba(34,214,138,0.08); color: var(--correct); }
.q-explain.wrong-ex { background: rgba(239,68,68,0.06); color: #fca5a5; }

.quiz-result {
  text-align: center;
  padding: 20px;
  margin-top: 20px;
  background: var(--surface);
  border-radius: 12px;
  border: 1px solid var(--border);
  display: none;
}
.quiz-result.show { display: block; }
.quiz-result .score {
  font-size: 2rem;
  font-weight: 900;
  font-family: 'JetBrains Mono', monospace;
}
.quiz-result .score.perfect { color: var(--correct); }
.quiz-result .score.good { color: var(--warn); }
.quiz-result .score.retry { color: var(--error); }

/* Submit / Next */
.btn-row {
  display: flex;
  gap: 12px;
  margin-top: 24px;
  justify-content: flex-end;
}
.btn {
  padding: 10px 28px;
  border-radius: 8px;
  font-size: 0.9rem;
  font-weight: 700;
  cursor: pointer;
  border: none;
  transition: all 0.2s;
  font-family: 'Noto Sans TC', sans-serif;
}
.btn-primary {
  background: var(--accent);
  color: #000;
}
.btn-primary:hover { background: #2ee89a; transform: translateY(-1px); }
.btn-secondary {
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border);
}
.btn-secondary:hover { border-color: var(--accent); }

/* Responsive */
@media (max-width: 600px) {
  .app { padding: 12px 12px 60px; }
  .header h1 { font-size: 1.6rem; }
  .lesson-title { font-size: 1.3rem; }
  pre { font-size: 0.75rem; padding: 12px; }
}
</style>
</head>
<body>
<div class="app">

<div class="header">
  <h1>Python 速成核心課程</h1>
  <div class="sub">專為有 <strong>C/C++ · JS</strong> 基礎的工程師設計 — 8 堂課切入產業即戰力</div>
</div>

<div class="progress-wrap">
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="progress-label" id="progressLabel">0 / 8 完成</div>
</div>

<div class="nav" id="lessonNav"></div>

<div id="lessonContainer"></div>

</div>

<script>
const LESSONS = [
// ===== LESSON 1 =====
{
  id: 1,
  title: "語法骨架：10 分鐘搞定 Python 語法",
  time: "15 min",
  content: `
<div class="concept">
<h3>Python vs C/JS — 三個最大差異</h3>
<p><span class="compare-tag py">Python</span> 用<b>縮排</b>取代大括號 <code>{}</code>，<b>不需要分號</b>，<b>不需要宣告型別</b>。</p>
<pre><span class="cmt"># C++ 要寫: int x = 10;</span>
<span class="cmt"># JS 要寫:  let x = 10;</span>
<span class="cmt"># Python 直接：</span>
x <span class="op">=</span> <span class="num">10</span>
name <span class="op">=</span> <span class="str">"Rich"</span>
is_ready <span class="op">=</span> <span class="kw">True</span>    <span class="cmt"># 注意：大寫 T / F</span></pre>
</div>

<div class="concept">
<h3>條件 / 迴圈 — 告別大括號</h3>
<pre><span class="cmt"># if / elif / else</span>
<span class="kw">if</span> x <span class="op">></span> <span class="num">5</span>:
    <span class="fn">print</span>(<span class="str">"大於 5"</span>)
<span class="kw">elif</span> x <span class="op">==</span> <span class="num">5</span>:
    <span class="fn">print</span>(<span class="str">"等於 5"</span>)
<span class="kw">else</span>:
    <span class="fn">print</span>(<span class="str">"小於 5"</span>)

<span class="cmt"># for 迴圈 — 沒有 i++ 那套</span>
<span class="kw">for</span> i <span class="kw">in</span> <span class="fn">range</span>(<span class="num">5</span>):       <span class="cmt"># 0,1,2,3,4</span>
    <span class="fn">print</span>(i)

<span class="kw">for</span> name <span class="kw">in</span> [<span class="str">"Alice"</span>, <span class="str">"Bob"</span>]:
    <span class="fn">print</span>(name)

<span class="cmt"># while</span>
<span class="kw">while</span> x <span class="op">></span> <span class="num">0</span>:
    x <span class="op">-=</span> <span class="num">1</span></pre>
<div class="tip">Python 的 <code>for</code> 其實更像 JS 的 <code>for...of</code>，不是 C 的三段式。</div>
</div>

<div class="concept">
<h3>函式定義</h3>
<pre><span class="kw">def</span> <span class="fn">greet</span>(name, times<span class="op">=</span><span class="num">1</span>):
    <span class="str">"""打招呼（這是 docstring）"""</span>
    <span class="kw">for</span> _ <span class="kw">in</span> <span class="fn">range</span>(times):
        <span class="fn">print</span>(<span class="str">f"Hello, </span>{name}<span class="str">!"</span>)
    <span class="kw">return</span> times

<span class="fn">greet</span>(<span class="str">"Rich"</span>)           <span class="cmt"># times 用預設值 1</span>
<span class="fn">greet</span>(<span class="str">"Rich"</span>, times<span class="op">=</span><span class="num">3</span>)  <span class="cmt"># keyword argument</span></pre>
<div class="tip"><code>f"Hello, {name}!"</code> 是 f-string，等同 JS 的模板字串 <code>\`Hello, \${name}!\`</code></div>
</div>
`,
  quiz: [
    {
      q: "以下哪個是合法的 Python 程式碼？",
      opts: [
        "if (x > 5) { print('yes') }",
        "if x > 5:\\n    print('yes')",
        "if x > 5 then print('yes')",
        "IF x > 5: print('yes')"
      ],
      ans: 1,
      explain: "Python 用冒號 + 縮排取代大括號，不需要小括號包條件（但加了也不會錯），沒有 then 關鍵字，if 是小寫。"
    },
    {
      q: "range(3) 產生的數字是？",
      opts: ["1, 2, 3", "0, 1, 2", "0, 1, 2, 3", "1, 2"],
      ans: 1,
      explain: "range(n) 從 0 開始，到 n-1 結束。range(3) → 0, 1, 2。跟 C 的 for(int i=0; i<3; i++) 一樣。"
    },
    {
      q: "Python 的布林值怎麼寫？",
      opts: ["true / false", "TRUE / FALSE", "True / False", "1 / 0"],
      ans: 2,
      explain: "Python 布林值是首字母大寫：True 和 False。這跟 JS/C 的全小寫不同。"
    }
  ]
},

// ===== LESSON 2 =====
{
  id: 2,
  title: "資料結構四天王：list / dict / tuple / set",
  time: "20 min",
  content: `
<div class="concept">
<h3>List — 就是你熟悉的陣列</h3>
<pre>nums <span class="op">=</span> [<span class="num">1</span>, <span class="num">2</span>, <span class="num">3</span>, <span class="num">4</span>, <span class="num">5</span>]
nums.<span class="fn">append</span>(<span class="num">6</span>)         <span class="cmt"># push</span>
nums.<span class="fn">pop</span>()              <span class="cmt"># 移除最後一個</span>
nums[<span class="num">0</span>]                 <span class="cmt"># 取第一個 → 1</span>
nums[<span class="op">-</span><span class="num">1</span>]                <span class="cmt"># 取最後一個 → 5</span>
nums[<span class="num">1</span>:<span class="num">3</span>]               <span class="cmt"># slice → [2, 3]</span>
<span class="fn">len</span>(nums)               <span class="cmt"># 長度</span></pre>
<div class="tip"><code>[-1]</code> 負數索引是 Python 殺手級功能，C/JS 做不到。</div>
</div>

<div class="concept">
<h3>Dict — 就是 JS 的 Object / C++ 的 map</h3>
<pre>user <span class="op">=</span> {
    <span class="str">"name"</span>: <span class="str">"Rich"</span>,
    <span class="str">"role"</span>: <span class="str">"engineer"</span>,
    <span class="str">"level"</span>: <span class="num">99</span>
}
user[<span class="str">"name"</span>]             <span class="cmt"># "Rich"</span>
user.<span class="fn">get</span>(<span class="str">"age"</span>, <span class="num">0</span>)       <span class="cmt"># 不存在回傳預設值 0</span>
user[<span class="str">"age"</span>] <span class="op">=</span> <span class="num">30</span>         <span class="cmt"># 新增/更新</span>

<span class="cmt"># 遍歷</span>
<span class="kw">for</span> key, val <span class="kw">in</span> user.<span class="fn">items</span>():
    <span class="fn">print</span>(<span class="str">f"</span>{key}<span class="str">: </span>{val}<span class="str">"</span>)</pre>
</div>

<div class="concept">
<h3>Tuple 與 Set</h3>
<pre><span class="cmt"># Tuple — 不可變的 list</span>
point <span class="op">=</span> (<span class="num">10</span>, <span class="num">20</span>)         <span class="cmt"># 建立後不能改</span>
x, y <span class="op">=</span> point             <span class="cmt"># 解構賦值！</span>

<span class="cmt"># Set — 不重複集合</span>
tags <span class="op">=</span> {<span class="str">"python"</span>, <span class="str">"ai"</span>, <span class="str">"python"</span>}
<span class="fn">print</span>(tags)  <span class="cmt"># {'python', 'ai'} — 自動去重</span>
<span class="str">"ai"</span> <span class="kw">in</span> tags  <span class="cmt"># True — O(1) 查找</span></pre>
<div class="tip">函式要回傳多個值？直接 <code>return x, y</code>，Python 自動包成 tuple。</div>
</div>

<div class="concept">
<h3>List Comprehension — Python 的靈魂語法</h3>
<pre><span class="cmt"># 傳統寫法</span>
squares <span class="op">=</span> []
<span class="kw">for</span> i <span class="kw">in</span> <span class="fn">range</span>(<span class="num">10</span>):
    squares.<span class="fn">append</span>(i <span class="op">**</span> <span class="num">2</span>)

<span class="cmt"># Pythonic 一行搞定</span>
squares <span class="op">=</span> [i <span class="op">**</span> <span class="num">2</span> <span class="kw">for</span> i <span class="kw">in</span> <span class="fn">range</span>(<span class="num">10</span>)]

<span class="cmt"># 帶條件篩選</span>
evens <span class="op">=</span> [i <span class="kw">for</span> i <span class="kw">in</span> <span class="fn">range</span>(<span class="num">20</span>) <span class="kw">if</span> i <span class="op">%</span> <span class="num">2</span> <span class="op">==</span> <span class="num">0</span>]

<span class="cmt"># Dict comprehension</span>
name_len <span class="op">=</span> {n: <span class="fn">len</span>(n) <span class="kw">for</span> n <span class="kw">in</span> [<span class="str">"Alice"</span>, <span class="str">"Bob"</span>]}</pre>
<div class="warn-box">面試和實務中，list comprehension 出現頻率極高，一定要會。</div>
</div>
`,
  quiz: [
    {
      q: "取得 list 最後一個元素的 Pythonic 寫法？",
      opts: ["nums[len(nums)-1]", "nums[-1]", "nums.last()", "nums.end()"],
      ans: 1,
      explain: "nums[-1] 是 Python 的負數索引，直接取最後一個元素。最 Pythonic 也最簡潔。"
    },
    {
      q: "<code>d.get('key', 0)</code> 當 key 不存在時回傳什麼？",
      opts: ["None", "拋出 KeyError", "0", "空字串"],
      ans: 2,
      explain: ".get(key, default) 找不到 key 時回傳 default 值。直接用 d['key'] 才會拋出 KeyError。"
    },
    {
      q: "<code>[x*2 for x in range(3)]</code> 的結果是？",
      opts: ["[2, 4, 6]", "[0, 2, 4]", "[1, 2, 3]", "[0, 1, 2]"],
      ans: 1,
      explain: "range(3) → 0,1,2，每個乘以 2 → [0, 2, 4]。"
    }
  ]
},

// ===== LESSON 3 =====
{
  id: 3,
  title: "模組與套件：import 的世界觀",
  time: "15 min",
  content: `
<div class="concept">
<h3>import 語法 — 比 C/JS 都簡單</h3>
<pre><span class="kw">import</span> os                     <span class="cmt"># 整個模組</span>
<span class="kw">import</span> json <span class="kw">as</span> j              <span class="cmt"># 別名</span>
<span class="kw">from</span> pathlib <span class="kw">import</span> Path      <span class="cmt"># 只引特定東西</span>

    <span class="kw">return</span> {<span class="str">"url"</span>: url, <span class="str">"status"</span>: <span class="num">200</span>}

// ===== APP STATE =====
let currentLesson = 0;
const completed = new Set();
const quizStates = {};

function init() {
  renderNav();
  renderLesson(0);
  updateProgress();
}

function renderNav() {
  const nav = document.getElementById('lessonNav');
  nav.innerHTML = LESSONS.map((l, i) => 
    `<div class="nav-pill ${i===currentLesson?'active':''} ${completed.has(i)?'completed':''}" onclick="goToLesson(${i})">L${l.id}</div>`
  ).join('');
}

function goToLesson(idx) {
  currentLesson = idx;
  renderNav();
  renderLesson(idx);
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function renderLesson(idx) {
  const l = LESSONS[idx];
  const container = document.getElementById('lessonContainer');
  
  if (!quizStates[idx]) {
    quizStates[idx] = { answers: {}, submitted: false };
  }
  const qs = quizStates[idx];

  let quizHTML = l.quiz.map((q, qi) => {
    const optsHTML = q.opts.map((opt, oi) => {
      let cls = 'q-opt';
      if (qs.submitted) {
        cls += ' disabled';
        if (oi === q.ans) cls += ' correct';
        else if (qs.answers[qi] === oi) cls += ' wrong';
      } else if (qs.answers[qi] === oi) {
        cls += ' selected';
      }
      return `<div class="${cls}" onclick="selectAnswer(${idx},${qi},${oi})">
        <span class="marker">${String.fromCharCode(65+oi)}</span>
        <span>${opt}</span>
      </div>`;
    }).join('');

    let explainHTML = '';
    if (qs.submitted) {
      const isCorrect = qs.answers[qi] === q.ans;
      explainHTML = `<div class="q-explain show ${isCorrect?'correct-ex':'wrong-ex'}">
        ${isCorrect ? '✅ 正確！' : '❌ 錯誤。'} ${q.explain}
      </div>`;
    }

    return `<div class="quiz-q">
      <div class="q-num">Q${qi+1}</div>
      <div class="q-text">${q.q}</div>
      ${optsHTML}
      ${explainHTML}
    </div>`;
  }).join('');

  // Quiz result
  let resultHTML = '';
  if (qs.submitted) {
    const correct = l.quiz.filter((q,i) => qs.answers[i] === q.ans).length;
    const total = l.quiz.length;
    const pct = Math.round(correct/total*100);
    const cls = pct === 100 ? 'perfect' : pct >= 60 ? 'good' : 'retry';
    resultHTML = `<div class="quiz-result show">
      <div class="score ${cls}">${correct} / ${total}</div>
      <div style="color:var(--text-dim);margin-top:8px;font-size:0.85rem">
        ${pct===100 ? '🎉 全對！太強了' : pct >= 60 ? '👍 不錯，繼續加油' : '💪 再複習一下這課的內容'}
      </div>
    </div>`;
  }

  // Buttons
  let btnHTML = '<div class="btn-row">';
  if (!qs.submitted) {
    const allAnswered = l.quiz.every((_, i) => qs.answers[i] !== undefined);
    btnHTML += `<button class="btn btn-primary" onclick="submitQuiz(${idx})" ${allAnswered?'':'disabled'}>交卷批改</button>`;
  } else {
    if (idx < LESSONS.length - 1) {
      btnHTML += `<button class="btn btn-primary" onclick="goToLesson(${idx+1})">下一課 →</button>`;
    } else {
      btnHTML += `<button class="btn btn-primary" style="background:#f59e0b" disabled>🎓 全部完成！</button>`;
    }
  }
  btnHTML += '</div>';

  container.innerHTML = `
    <div class="lesson active">
      <div class="lesson-header">
        <div class="lesson-num">Lesson ${l.id}</div>
        <div class="lesson-title">${l.title}</div>
        <div class="lesson-time">${l.time}</div>
      </div>
      ${l.content}
      <div class="quiz-section">
        <h3>隨堂小考</h3>
        ${quizHTML}
        ${resultHTML}
        ${btnHTML}
      </div>
    </div>
  `;
}

function selectAnswer(lessonIdx, qIdx, optIdx) {
  const qs = quizStates[lessonIdx];
  if (qs.submitted) return;
  qs.answers[qIdx] = optIdx;
  renderLesson(lessonIdx);
}

function submitQuiz(lessonIdx) {
  quizStates[lessonIdx].submitted = true;
  completed.add(lessonIdx);
  renderLesson(lessonIdx);
  renderNav();
  updateProgress();
}

function updateProgress() {
  const pct = Math.round(completed.size / LESSONS.length * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${completed.size} / ${LESSONS.length} 完成`;
}

init();
</script>
