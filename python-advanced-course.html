// ===== LESSON 9 =====
{
  id: 9,
  title: "Decorator 深入：函式包函式的魔法",
  time: "20 min",
  content: `
<div class="concept">
<h3>Decorator 的本質 — 就是一個「包裝函式」</h3>
<p>你用 C++ 想：decorator 就像一個 wrapper function，接收一個 function，回傳一個「增強版」的 function。</p>
<pre><span class="cmt"># 最簡單的 decorator</span>
<span class="kw">def</span> <span class="fn">log_call</span>(func):
    <span class="kw">def</span> <span class="fn">wrapper</span>(<span class="op">*</span>args, <span class="op">**</span>kwargs):
        <span class="fn">print</span>(<span class="str">f"▶ 呼叫 </span>{func.__name__}<span class="str">"</span>)
        result <span class="op">=</span> <span class="fn">func</span>(<span class="op">*</span>args, <span class="op">**</span>kwargs)
        <span class="fn">print</span>(<span class="str">f"◀ </span>{func.__name__}<span class="str"> 回傳 </span>{result}<span class="str">"</span>)
        <span class="kw">return</span> result
    <span class="kw">return</span> wrapper

<span class="dec">@log_call</span>
<span class="kw">def</span> <span class="fn">add</span>(a, b):
    <span class="kw">return</span> a <span class="op">+</span> b

<span class="fn">add</span>(<span class="num">3</span>, <span class="num">5</span>)
<span class="cmt"># ▶ 呼叫 add</span>
<span class="cmt"># ◀ add 回傳 8</span></pre>
<div class="tip"><code>@log_call</code> 只是語法糖，等同 <code>add = log_call(add)</code>。</div>
</div>

<div class="concept">
<h3>帶參數的 Decorator — 三層巢狀</h3>
<pre><span class="kw">import</span> functools, time

<span class="kw">def</span> <span class="fn">retry</span>(max_attempts<span class="op">=</span><span class="num">3</span>, delay<span class="op">=</span><span class="num">1</span>):
    <span class="kw">def</span> <span class="fn">decorator</span>(func):
        <span class="dec">@functools.wraps</span>(func)  <span class="cmt"># 保留原函式名稱/docstring</span>
        <span class="kw">def</span> <span class="fn">wrapper</span>(<span class="op">*</span>args, <span class="op">**</span>kwargs):
            <span class="kw">for</span> attempt <span class="kw">in</span> <span class="fn">range</span>(max_attempts):
                <span class="kw">try</span>:
                    <span class="kw">return</span> <span class="fn">func</span>(<span class="op">*</span>args, <span class="op">**</span>kwargs)
                <span class="kw">except</span> <span class="type">Exception</span> <span class="kw">as</span> e:
                    <span class="kw">if</span> attempt <span class="op">==</span> max_attempts <span class="op">-</span> <span class="num">1</span>:
                        <span class="kw">raise</span>
                    <span class="fn">print</span>(<span class="str">f"重試 </span>{attempt+1}<span class="str">/</span>{max_attempts}<span class="str">: </span>{e}<span class="str">"</span>)
                    time.<span class="fn">sleep</span>(delay)
        <span class="kw">return</span> wrapper
    <span class="kw">return</span> decorator

<span class="dec">@retry</span>(max_attempts<span class="op">=</span><span class="num">5</span>, delay<span class="op">=</span><span class="num">2</span>)
<span class="kw">def</span> <span class="fn">call_openai</span>(prompt):
    ...</pre>
<div class="real-box">你的 AI Gateway 呼叫 OpenAI/Gemini API 時，用這種 <code>@retry</code> 處理暫時性錯誤超實用。</div>
</div>

<div class="concept">
<h3>實用 Decorator 範例：計時器</h3>
<pre><span class="kw">import</span> functools, time

<span class="kw">def</span> <span class="fn">timer</span>(func):
    <span class="dec">@functools.wraps</span>(func)
    <span class="kw">def</span> <span class="fn">wrapper</span>(<span class="op">*</span>args, <span class="op">**</span>kwargs):
        start <span class="op">=</span> time.<span class="fn">perf_counter</span>()
        result <span class="op">=</span> <span class="fn">func</span>(<span class="op">*</span>args, <span class="op">**</span>kwargs)
        elapsed <span class="op">=</span> time.<span class="fn">perf_counter</span>() <span class="op">-</span> start
        <span class="fn">print</span>(<span class="str">f"</span>{func.__name__}<span class="str"> 耗時 </span>{elapsed:.3f}<span class="str">s"</span>)
        <span class="kw">return</span> result
    <span class="kw">return</span> wrapper

<span class="dec">@timer</span>
<span class="kw">def</span> <span class="fn">heavy_query</span>():
    time.<span class="fn">sleep</span>(<span class="num">0.5</span>)
    <span class="kw">return</span> <span class="str">"done"</span>

<span class="fn">heavy_query</span>()  <span class="cmt"># heavy_query 耗時 0.502s</span></pre>
<div class="tip"><code>functools.wraps</code> 很重要！沒加的話 <code>heavy_query.__name__</code> 會變成 <code>"wrapper"</code>，debug 時會崩潰。</div>
</div>

<div class="concept">
<h3>Class-based Decorator</h3>
<pre><span class="kw">class</span> <span class="type">CacheResult</span>:
    <span class="kw">def</span> <span class="fn">__init__</span>(self, func):
        self.func <span class="op">=</span> func
        self.cache <span class="op">=</span> {}

    <span class="kw">def</span> <span class="fn">__call__</span>(self, <span class="op">*</span>args):
        <span class="kw">if</span> args <span class="kw">not in</span> self.cache:
            self.cache[args] <span class="op">=</span> self.<span class="fn">func</span>(<span class="op">*</span>args)
        <span class="kw">return</span> self.cache[args]

<span class="dec">@CacheResult</span>
<span class="kw">def</span> <span class="fn">fib</span>(n):
    <span class="kw">if</span> n <span class="op"><</span> <span class="num">2</span>: <span class="kw">return</span> n
    <span class="kw">return</span> <span class="fn">fib</span>(n<span class="op">-</span><span class="num">1</span>) <span class="op">+</span> <span class="fn">fib</span>(n<span class="op">-</span><span class="num">2</span>)

<span class="cmt"># 內建版本更好用：</span>
<span class="kw">from</span> functools <span class="kw">import</span> lru_cache

<span class="dec">@lru_cache</span>(maxsize<span class="op">=</span><span class="num">128</span>)
<span class="kw">def</span> <span class="fn">fib</span>(n):
    <span class="kw">if</span> n <span class="op"><</span> <span class="num">2</span>: <span class="kw">return</span> n
    <span class="kw">return</span> <span class="fn">fib</span>(n<span class="op">-</span><span class="num">1</span>) <span class="op">+</span> <span class="fn">fib</span>(n<span class="op">-</span><span class="num">2</span>)</pre>
</div>
`,
  quiz: [
    {
      q: "<code>@my_decorator</code> 等同於以下哪個操作？",
      opts: [
        "func = my_decorator()",
        "func = my_decorator(func)",
        "my_decorator = func(my_decorator)",
        "func.decorator = my_decorator"
      ],
      ans: 1,
      explain: "@my_decorator 放在 def func 上方，等同 func = my_decorator(func)，也就是把原函式傳入 decorator，用回傳的新函式取代原本的。"
    },
    {
      q: "<code>functools.wraps(func)</code> 的作用是什麼？",
      opts: [
        "讓 decorator 執行更快",
        "保留原函式的 __name__ 和 __doc__",
        "自動加上錯誤處理",
        "禁止原函式被修改"
      ],
      ans: 1,
      explain: "wraps 把原函式的 metadata（名稱、docstring、module 等）複製到 wrapper 上，debug 和文件生成時才能正確識別函式。"
    },
    {
      q: "帶參數的 decorator（如 <code>@retry(max=3)</code>）需要幾層巢狀函式？",
      opts: ["1 層", "2 層", "3 層", "4 層"],

      explain: "三層：最外層接收 decorator 參數 → 中間層接收被裝飾的函式 → 最內層是實際執行的 wrapper。"
    },
    {
      q: "<code>@lru_cache(maxsize=128)</code> 做了什麼？",
      opts: [
        "限制函式只能呼叫 128 次",
        "快取最近 128 個不同輸入的回傳值",
        "限制回傳值最大為 128",
        "建立 128 個函式副本"
      ],
      ans: 1,
      explain: "LRU cache 快取最近使用的 128 組 (args, kwargs) → result 對應，相同輸入直接回傳快取值，不重新計算。"
    }
  ]
},

  time: "20 min",
  content: `
<div class="concept">
<h3>Generator 基本概念 — 「懶人版 list」</h3>
<p>Generator 不是一次算出所有結果，而是「每次要一個才算一個」。處理大資料或串流時省記憶體。</p>
<pre><span class="cmt"># 普通函式：一次回傳全部</span>
<span class="kw">def</span> <span class="fn">get_squares</span>(n):
    result <span class="op">=</span> []
    <span class="kw">for</span> i <span class="kw">in</span> <span class="fn">range</span>(n):
        result.<span class="fn">append</span>(i <span class="op">**</span> <span class="num">2</span>)
    <span class="kw">return</span> result  <span class="cmt"># 記憶體中存了整個 list</span>

<span class="cmt"># Generator：逐個產出</span>
<span class="kw">def</span> <span class="fn">gen_squares</span>(n):
    <span class="kw">for</span> i <span class="kw">in</span> <span class="fn">range</span>(n):
        <span class="kw">yield</span> i <span class="op">**</span> <span class="num">2</span>  <span class="cmt"># 暫停，交出值，下次再繼續</span>

<span class="cmt"># 使用方式一樣</span>

</div>

<div class="concept">
<h3>Generator Expression — 一行版</h3>
<pre><span class="cmt"># List comprehension → 整個 list 存在記憶體</span>

<span class="cmt"># Generator expression → 惰性求值，幾乎不佔記憶體</span>
squares_gen <span class="op">=</span> (i<span class="op">**</span><span class="num">2</span> <span class="kw">for</span> i <span class="kw">in</span> <span class="fn">range</span>(<span class="num">1000000</span>))

<span class="fn">sum</span>(i<span class="op">**</span><span class="num">2</span> <span class="kw">for</span> i <span class="kw">in</span> <span class="fn">range</span>(<span class="num">100</span>))  <span class="cmt"># 直接傳入函式更簡潔</span></pre>
</div>

<div class="concept">
<h3>yield from — 委派給子 generator</h3>
<pre><span class="kw">def</span> <span class="fn">read_files</span>(paths):
    <span class="kw">for</span> path <span class="kw">in</span> paths:
        <span class="kw">yield from</span> <span class="fn">read_lines</span>(path)  <span class="cmt"># 把子 generator 的值逐個交出</span>

<span class="kw">def</span> <span class="fn">read_lines</span>(path):
    <span class="kw">with</span> <span class="fn">open</span>(path) <span class="kw">as</span> f:
        <span class="kw">for</span> line <span class="kw">in</span> f:
            <span class="kw">yield</span> line.<span class="fn">strip</span>()</pre>

</div>

<div class="concept">
<h3>Async Generator — 你的 SSE Streaming</h3>

<div class="concept">
<h3>復習：with 的運作原理</h3>
<p><code>with X as y:</code> 進入時呼叫 <code>X.__enter__()</code>，離開時呼叫 <code>X.__exit__()</code>，即使發生例外也保證執行。</p>
<pre><span class="cmt"># 你每天寫的：</span>

<span class="cmt"># 等同於：</span>
<span class="cmt"># f = open("file.txt")</span>
<span class="cmt"># f.__enter__()</span>
<span class="cmt"># try:</span>
<span class="cmt">#     data = f.read()</span>
<span class="cmt"># finally:</span>
<span class="cmt">#     f.__exit__(...)</span></pre>

<div class="concept">
<h3>方法一：Class 實作 __enter__ / __exit__</h3>
<pre><span class="kw">import</span> time

<span class="kw">class</span> <span class="type">Timer</span>:

        <span class="kw">return</span> self  <span class="cmt"># 這就是 as 後面拿到的東西</span>

    <span class="kw">def</span> <span class="fn">__exit__</span>(self, exc_type, exc_val, exc_tb):
        self.elapsed <span class="op">=</span> time.<span class="fn">perf_counter</span>() <span class="op">-</span> self.start
        <span class="fn">print</span>(<span class="str">f"耗時 </span>{self.elapsed:.3f}<span class="str">s"</span>)
        <span class="kw">return</span> <span class="kw">False</span>  <span class="cmt"># False = 不吞掉例外</span>

<span class="kw">with</span> <span class="type">Timer</span>() <span class="kw">as</span> t:
    time.<span class="fn">sleep</span>(<span class="num">0.5</span>)
<span class="cmt"># 耗時 0.502s</span></pre>
</div>

<div class="concept">

    <span class="kw">try</span>:

    <span class="kw">finally</span>:

        <span class="fn">print</span>(<span class="str">f"</span>{label}<span class="str"> 耗時 </span>{elapsed:.3f}<span class="str">s"</span>)

<span class="kw">with</span> <span class="fn">timer</span>(<span class="str">"DB query"</span>):
    <span class="fn">do_heavy_query</span>()</pre>
<div class="tip"><code>yield</code> 之前的代碼 = 進入時執行，<code>yield</code> 之後的代碼 = 離開時執行。用 <code>try/finally</code> 保證清理。</div>

// ===== APP STATE & LOGIC (identical structure to L1-L8) =====
let currentLesson = 0;
const completed = new Set();
const quizStates = {};
const TOTAL = LESSONS.length;

function init() {
  renderNav();
  renderLesson(0);
  updateProgress();
}

function renderNav() {
  const nav = document.getElementById('lessonNav');
  nav.innerHTML = LESSONS.map((l, i) =>
    `<div class="nav-pill ${i===currentLesson?'active':''} ${completed.has(i)?'completed':''}" onclick="goToLesson(${i})">L${l.id}</div>`
  ).join('');
}

function goToLesson(idx) {
  currentLesson = idx;
  renderNav();
  renderLesson(idx);
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function renderLesson(idx) {
  const l = LESSONS[idx];
  const container = document.getElementById('lessonContainer');

  if (!quizStates[idx]) {
    quizStates[idx] = { answers: {}, submitted: false };
  }
  const qs = quizStates[idx];

  let quizHTML = l.quiz.map((q, qi) => {
    const optsHTML = q.opts.map((opt, oi) => {
      let cls = 'q-opt';
      if (qs.submitted) {
        cls += ' disabled';
        if (oi === q.ans) cls += ' correct';
        else if (qs.answers[qi] === oi) cls += ' wrong';
      } else if (qs.answers[qi] === oi) {
        cls += ' selected';
      }
      return `<div class="${cls}" onclick="selectAnswer(${idx},${qi},${oi})">
        <span class="marker">${String.fromCharCode(65+oi)}</span>
        <span>${opt}</span>
      </div>`;
    }).join('');

    let explainHTML = '';
    if (qs.submitted) {
      const isCorrect = qs.answers[qi] === q.ans;
      explainHTML = `<div class="q-explain show ${isCorrect?'correct-ex':'wrong-ex'}">
        ${isCorrect ? '✅ 正確！' : '❌ 錯誤。'} ${q.explain}
      </div>`;
    }

    return `<div class="quiz-q">
      <div class="q-num">Q${qi+1}</div>
      <div class="q-text">${q.q}</div>
      ${optsHTML}
      ${explainHTML}
    </div>`;
  }).join('');

  let resultHTML = '';
  if (qs.submitted) {
    const correct = l.quiz.filter((q,i) => qs.answers[i] === q.ans).length;
    const total = l.quiz.length;
    const pct = Math.round(correct/total*100);
    const cls = pct === 100 ? 'perfect' : pct >= 60 ? 'good' : 'retry';
    resultHTML = `<div class="quiz-result show">
      <div class="score ${cls}">${correct} / ${total}</div>
      <div style="color:var(--text-dim);margin-top:8px;font-size:0.85rem">
        ${pct===100 ? '🎉 全對！太強了' : pct >= 60 ? '👍 不錯，繼續加油' : '💪 再複習一下這課的內容'}
      </div>
    </div>`;
  }

  // Completion banner
  let bannerHTML = '';
  if (qs.submitted && idx === TOTAL - 1 && completed.size === TOTAL) {
    bannerHTML = `<div class="completion-banner show">
      <div class="trophy">🏆</div>
      <h2>L1 — L15 全部完成！</h2>
      <p>從基礎語法到 decorator、generator、context manager、magic methods、<br>
      進階錯誤處理、pytest 和 functional 工具 — 你已經具備完整的 Python 即戰力。<br><br>
      結合你已經建好的 AI Gateway 實戰經驗，<br>
      <strong style="color:var(--accent)">你就是一個 Python AI 應用工程師。</strong></p>
    </div>`;
  }

  let btnHTML = '<div class="btn-row">';
  if (!qs.submitted) {
    const allAnswered = l.quiz.every((_, i) => qs.answers[i] !== undefined);
    btnHTML += `<button class="btn btn-primary" onclick="submitQuiz(${idx})" ${allAnswered?'':'disabled'}>交卷批改</button>`;
  } else {
    if (idx < TOTAL - 1) {
      btnHTML += `<button class="btn btn-primary" onclick="goToLesson(${idx+1})">下一課 →</button>`;
    } else if (completed.size === TOTAL) {
      btnHTML += `<button class="btn btn-primary" style="background:var(--green);color:#000" disabled>🎓 全課程完成！</button>`;
    } else {
      btnHTML += `<button class="btn btn-secondary" onclick="goToLesson(0)">回到 L9 複習</button>`;
    }
  }
  btnHTML += '</div>';

  container.innerHTML = `
    <div class="lesson active">
      <div class="lesson-header">
        <div class="lesson-num">Lesson ${l.id}</div>
        <div class="lesson-title">${l.title}</div>
        <div class="lesson-time">${l.time}</div>
      </div>
      ${l.content}
      <div class="quiz-section">
        <h3>隨堂小考</h3>
        ${quizHTML}
        ${resultHTML}
        ${btnHTML}
        ${bannerHTML}
      </div>
    </div>
  `;
}

function selectAnswer(lessonIdx, qIdx, optIdx) {
  const qs = quizStates[lessonIdx];
  if (qs.submitted) return;
  qs.answers[qIdx] = optIdx;
  renderLesson(lessonIdx);
}

function submitQuiz(lessonIdx) {
  quizStates[lessonIdx].submitted = true;
  completed.add(lessonIdx);
  renderLesson(lessonIdx);
  renderNav();
  updateProgress();
}

function updateProgress() {
  const pct = Math.round(completed.size / TOTAL * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${completed.size} / ${TOTAL} 完成`;
}

init();
</script>
</body>
</html>
